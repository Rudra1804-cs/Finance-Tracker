<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Day View - BillFlow</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-dots">
  <div class="app-container">
    <nav class="sidebar">
      <div class="logo-container">
        <div class="logo-icon">$</div>
        <h1 class="logo-text">BillFlow</h1>
      </div>
      <div class="nav-links">
        <a href="index.html" class="nav-item">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
          <span>Dashboard</span>
        </a>
        <a href="transactions.html" class="nav-item">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"></path></svg>
          <span>Transactions</span>
        </a>
        <a href="subscriptions.html" class="nav-item">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
          <span>Subscriptions</span>
        </a>
        <a href="reports.html" class="nav-item">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path></svg>
          <span>Reports</span>
        </a>
      </div>
      <div class="sidebar-footer" id="sidebar-cal-trigger" onclick="toggleCalendar(true)" style="background: var(--slate-100); color: var(--slate-800); border: 1px solid var(--slate-200); text-align: left; cursor: pointer; padding: 1rem; margin-top: auto;">
        <div style="display: flex; justify-content: space-between; align-items: center;">
           <p style="font-size: 0.625rem; opacity: 0.6; font-weight: 700; text-transform: uppercase;">Financial Calendar</p>
           <svg width="12" height="12" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h7"></path></svg>
        </div>
        <div id="mini-calendar-grid" class="mini-grid">
          <!-- Injected by app.js -->
        </div>
      </div>
    </nav>

    <main class="main-content">
      <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
        <div>
          <h1 id="day-title" style="font-size: 2rem; font-weight: 800; color: var(--slate-800); letter-spacing: -0.025em;">Date Details</h1>
          <p id="day-subtitle" style="color: var(--slate-500); font-weight: 500;">Viewing breakdown for this day</p>
        </div>
        <button onclick="window.history.back()" class="btn btn-secondary">Back to Calendar</button>
      </header>

      <div class="grid-cols-12" style="margin-top: 2rem;">
        <!-- Summary for the day -->
        <div class="col-span-12 grid-cols-12" style="margin-bottom: 3rem;">
          <div class="glass-card col-span-4" style="padding: 1.5rem;">
            <p style="font-size: 0.75rem; font-weight: 700; color: var(--slate-400); text-transform: uppercase;">Total Spending</p>
            <p id="day-total" style="font-size: 1.5rem; font-weight: 800; color: var(--rose-500);">$0.00</p>
          </div>
          <div class="glass-card col-span-4" style="padding: 1.5rem;">
            <p style="font-size: 0.75rem; font-weight: 700; color: var(--slate-400); text-transform: uppercase;">Total Income</p>
            <p id="day-income" style="font-size: 1.5rem; font-weight: 800; color: var(--emerald-500);">$0.00</p>
          </div>
        </div>

        <!-- Transactions and Subscriptions -->
        <div class="col-span-6">
          <h3 style="font-weight: 800; margin-bottom: 1.5rem; color: var(--slate-700);">Transactions</h3>
          <div id="day-transactions-list" class="space-y-4">
            <!-- Injected by app.js -->
          </div>
        </div>

        <div class="col-span-6">
          <h3 style="font-weight: 800; margin-bottom: 1.5rem; color: var(--slate-700);">Upcoming/Due Subscriptions</h3>
          <div id="day-subscriptions-list" class="space-y-4">
            <!-- Injected by app.js -->
          </div>
        </div>
      </div>
    </main>
  </div>

  <div id="calendar-overlay" class="expanded-calendar-overlay">
    <div class="calendar-overlay-close" onclick="toggleCalendar(false)">
      <svg width="24" height="24" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
    </div>
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
      <h2 class="page-title">Financial Calendar</h2>
    </div>
    <div id="expanded-calendar-container" style="flex: 1; overflow-y: auto;"></div>
  </div>

  <script src="app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', initDayView);
  </script>
</body>
</html>
